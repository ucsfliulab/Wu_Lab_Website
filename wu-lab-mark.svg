    />
    <path
      d="M8 75C25 87 39 92 54 82C72 69 83 43 101 41C110 40 118 45 123 51"
      stroke="url(#aqua)"
      stroke-width="5.8"
    />
    <path d="M20 68L18 80" stroke="#f8fffd" stroke-width="3.8"/>
    <path d="M33 64L30 84" stroke="#f8fffd" stroke-width="3.8"/>
    <path d="M88 47L91 69" stroke="#f8fffd" stroke-width="3.8"/>
    <path d="M103 43L106 63" stroke="#f8fffd" stroke-width="3.8"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -8 144 144" role="img" aria-labelledby="title desc">
  <title id="title">Wu Lab mark</title>
  <desc id="desc">Stylized WL initials with orbit arcs and a DNA-inspired ribbon.</desc>
  <defs>
    <linearGradient id="deepTeal" x1="16" y1="16" x2="104" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f6f79"/>
      <stop offset="1" stop-color="#073f49"/>
    </linearGradient>
    <linearGradient id="aqua" x1="20" y1="88" x2="116" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d6d73"/>
      <stop offset="0.58" stop-color="#27b3ad"/>
      <stop offset="1" stop-color="#70d5cd"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0e4046" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <path

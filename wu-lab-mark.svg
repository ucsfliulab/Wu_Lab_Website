    <circle cx="102" cy="37" r="7.6" fill="url(#deepTeal)"/>
    <circle cx="34" cy="103" r="6.8" fill="url(#deepTeal)"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path
      d="M7 77C22 55 38 55 53 75C69 96 85 97 101 77C107 69 113 64 121 63"
